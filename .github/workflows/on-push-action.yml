name: learn-github-actions
run-name: ${{ github.actor }} is learning GitHub Actions
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        secrets: ${{ secrets.PAT }}
    
    - name: Set up Python 3.x
      uses: actions/setup-python@v2
      with:
        python-version: 3.x
     
    - name: Write to file
      run: |
        echo 'Ultimo Push ' & date +%c > log_exec_on_push.txt

    - name: test Commit changes
      run: |
        git config --global user.email "geissoncr@gmail.com"
        git config --global user.name "geissoncr"
        git add .
        git commit -m "Gravação de arquivos no push log_exec_on_push.txt"
        git push https://$ACCESS_TOKEN@github.com/Geissoncr/quantos-seguidores.git
